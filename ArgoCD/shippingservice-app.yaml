apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shippingservice-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rakeshkolipakaace/Microservices-e-commerce.git
    targetRevision: HEAD
    path: Helm/shippingservice
  destination:
    server: https://kubernetes.default.svc
    namespace: microservices
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
