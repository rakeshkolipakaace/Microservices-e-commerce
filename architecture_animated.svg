<svg width="100%" height="auto" viewBox="0 0 1920 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04070F"/><stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/><stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF"/><stop offset="100%" stop-color="#2979FF"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <polygon points="0 0, 14 7, 0 14" fill="#00E5FF"/>
    </marker>
    <style>
      .title { fill:#FFFFFF; font-size:42px; font-family:Arial; font-weight:bold; }
      .subtitle { fill:#9CA3AF; font-size:20px; font-family:Arial; }
      .section { fill:#00E5FF; font-size:26px; font-family:Arial; font-weight:bold; }
      .service { fill:#FFFFFF; font-size:18px; font-family:Arial; font-weight:bold; }
      .small { fill:#CBD5E1; font-size:14px; font-family:Arial; }
      .flow-line { stroke-dasharray: 20, 10; animation: dash 1s linear infinite; opacity: 0.7; }
      @keyframes dash { to { stroke-dashoffset: -30; } }
      .node { animation: pulse 2s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { filter: drop-shadow(0 0 5px rgba(0,229,255,0.1)); } 50% { filter: drop-shadow(0 0 10px rgba(0,229,255,0.4)); } }
    </style>
  </defs>
  <rect width="1920" height="1200" fill="url(#bg)"/>
  <text x="960" y="55" text-anchor="middle" class="title">🚀 Online Boutique — Service Dependency Mesh</text>
  <text x="960" y="95" text-anchor="middle" class="subtitle">Accurate gRPC Call Graph & Resource Flow</text>

  <!-- INTERNET & LOAD GENERATOR -->
  <g transform="translate(600, 140)">
    <rect class="node" width="300" height="80" rx="15" fill="url(#card)" stroke="#00E5FF" stroke-width="2"/>
    <text x="150" y="50" text-anchor="middle" class="service">🌐 Internet Users</text>
  </g>
  <g transform="translate(1020, 140)">
    <rect class="node" width="300" height="80" rx="15" fill="url(#card)" stroke="#F44336" stroke-width="2"/>
    <text x="150" y="50" text-anchor="middle" class="service">📈 Load Generator</text>
  </g>

  <!-- FRONTEND (CENTER HUB) -->
  <g transform="translate(710, 300)">
    <rect class="node" width="500" height="110" rx="20" fill="url(#card)" stroke="#2979FF" stroke-width="3"/>
    <text x="250" y="50" text-anchor="middle" style="fill:#00E5FF;font-size:32px;font-family:Arial;font-weight:bold;">🚀 FRONTEND</text>
    <text x="250" y="85" text-anchor="middle" class="infra" style="fill:#CBD5E1">Web UI & Gateway</text>
  </g>

  <!-- CLUSTER BOUNDARY -->
  <rect x="50" y="440" width="1820" height="580" rx="30" fill="none" stroke="#00E5FF" stroke-width="2" stroke-dasharray="12 10" opacity="0.4"/>

  <!-- CORE SERVICES -->
  <!-- Catalog -->
  <g transform="translate(100, 520)">
    <rect class="node" width="220" height="100" rx="15" fill="url(#card)" stroke="#00E5FF" stroke-width="2"/>
    <text x="110" y="50" text-anchor="middle" class="service">📦 Catalog</text>
  </g>
  <!-- Currency -->
  <g transform="translate(350, 520)">
    <rect class="node" width="220" height="100" rx="15" fill="url(#card)" stroke="#00E5FF" stroke-width="2"/>
    <text x="110" y="50" text-anchor="middle" class="service">💱 Currency</text>
  </g>
  <!-- Cart -->
  <g transform="translate(600, 520)">
    <rect class="node" width="220" height="100" rx="15" fill="url(#card)" stroke="#00E5FF" stroke-width="2"/>
    <text x="110" y="50" text-anchor="middle" class="service">🛒 Cart</text>
  </g>
  <!-- Recommendation -->
  <g transform="translate(850, 520)">
    <rect class="node" width="220" height="100" rx="15" fill="url(#card)" stroke="#00E5FF" stroke-width="2"/>
    <text x="110" y="50" text-anchor="middle" class="service">📊 Recommendations</text>
  </g>
  <!-- Ads -->
  <g transform="translate(1100, 520)">
    <rect class="node" width="220" height="100" rx="15" fill="url(#card)" stroke="#00E5FF" stroke-width="2"/>
    <text x="110" y="50" text-anchor="middle" class="service">📢 Ad Service</text>
  </g>
  <!-- Shipping -->
  <g transform="translate(1350, 520)">
    <rect class="node" width="220" height="100" rx="15" fill="url(#card)" stroke="#00E5FF" stroke-width="2"/>
    <text x="110" y="50" text-anchor="middle" class="service">🚚 Shipping</text>
  </g>
  <!-- Assistant -->
  <g transform="translate(1600, 520)">
    <rect class="node" width="220" height="100" rx="15" fill="url(#card)" stroke="#2979FF" stroke-width="2"/>
    <text x="110" y="50" text-anchor="middle" class="service">🤖 Assistant</text>
  </g>

  <!-- CHECKOUT & DOWNSTREAM -->
  <g transform="translate(810, 720)">
    <rect class="node" width="300" height="110" rx="20" fill="url(#card)" stroke="#FF6D00" stroke-width="3"/>
    <text x="150" y="65" text-anchor="middle" class="service" style="font-size:24px">💰 CHECKOUT</text>
  </g>

  <!-- Payment -->
  <g transform="translate(680, 880)">
    <rect class="node" width="220" height="90" rx="15" fill="url(#card)" stroke="#00E5FF" stroke-width="2"/>
    <text x="110" y="55" text-anchor="middle" class="service">💳 Payment</text>
  </g>
  <!-- Email -->
  <g transform="translate(920, 880)">
    <rect class="node" width="220" height="90" rx="15" fill="url(#card)" stroke="#00E5FF" stroke-width="2"/>
    <text x="110" y="55" text-anchor="middle" class="service">📧 Email</text>
  </g>
  <!-- Redis -->
  <g transform="translate(600, 440)">
    <rect class="node" width="220" height="60" rx="10" fill="url(#card)" stroke="#00E676" stroke-width="2"/>
    <text x="110" y="38" text-anchor="middle" class="service">💾 Redis</text>
  </g>

  <!-- CORRECT DEPENDENCY LINES (FRONTEND CALLS) -->
  <path class="flow-line" d="M750,180 L850,300" stroke="#00E5FF" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path class="flow-line" d="M1170,180 L1070,300" stroke="#F44336" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <path class="flow-line" d="M960,410 L210,520" stroke="#00E5FF" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path class="flow-line" d="M960,410 L460,520" stroke="#00E5FF" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path class="flow-line" d="M960,410 L710,520" stroke="#00E5FF" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path class="flow-line" d="M960,410 L960,520" stroke="#00E5FF" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path class="flow-line" d="M960,410 L1210,520" stroke="#00E5FF" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path class="flow-line" d="M960,410 L1460,520" stroke="#00E5FF" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path class="flow-line" d="M960,410 L1710,520" stroke="#00E5FF" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <path class="flow-line" d="M960,410 L960,720" stroke="#FF6D00" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <!-- CHECKOUT CALLS -->
  <path class="flow-line" d="M810,775 L210,620" stroke="#FF6D00" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path class="flow-line" d="M810,775 L710,620" stroke="#FF6D00" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path class="flow-line" d="M1110,775 L1460,620" stroke="#FF6D00" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path class="flow-line" d="M860,830 L790,880" stroke="#FF6D00" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path class="flow-line" d="M1060,830 L1030,880" stroke="#FF6D00" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- REDIS -->
  <path class="flow-line" d="M710,520 L710,500" stroke="#00E676" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- FOOTER PIPELINE -->
  <rect x="50" y="1040" width="1820" height="120" rx="24" fill="url(#card)" stroke="#2979FF" stroke-width="2"/>
  <text x="960" y="1110" text-anchor="middle" style="fill:#FFFFFF;font-size:18px;font-family:Arial;font-weight:bold;">
    🛠️ CI/CD AUTOMATION: Jenkins -> Docker Hub -> Helm -> Kubernetes (Zero Downtime Rolling Updates)
  </text>
</svg>
