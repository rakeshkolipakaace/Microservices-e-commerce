<svg width="100%" height="auto" viewBox="0 0 1920 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04070F"/><stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/><stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF"/><stop offset="100%" stop-color="#2979FF"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <polygon points="0 0, 14 7, 0 14" fill="#00E5FF"/>
    </marker>
    <style>
      .title { fill:#FFFFFF; font-size:42px; font-family:Arial; font-weight:bold; }
      .subtitle { fill:#9CA3AF; font-size:20px; font-family:Arial; }
      .section { fill:#00E5FF; font-size:26px; font-family:Arial; font-weight:bold; }
      .service { fill:#FFFFFF; font-size:18px; font-family:Arial; font-weight:bold; }
      .small { fill:#CBD5E1; font-size:14px; font-family:Arial; }
      .pipeline { fill:#00E5FF; font-size:16px; font-family:Arial; font-weight:bold; }
      .flow-line { stroke-dasharray: 20, 10; animation: dash 1s linear infinite; }
      @keyframes dash { to { stroke-dashoffset: -30; } }
      .node { animation: pulse 2s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { filter: drop-shadow(0 0 5px rgba(0,229,255,0.2)); } 50% { filter: drop-shadow(0 0 15px rgba(0,229,255,0.6)); } }
    </style>
  </defs>
  <rect width="1920" height="1200" fill="url(#bg)"/>
  <text x="960" y="55" text-anchor="middle" class="title">🚀 Online Boutique — 12-Service Enterprise Architecture</text>
  <text x="960" y="95" text-anchor="middle" class="subtitle">Full-Stack DevOps Managed Microservices Ecosystem</text>

  <!-- INGRESS LAYER -->
  <rect class="node" x="760" y="140" width="400" height="90" rx="18" fill="url(#card)" stroke="#00E5FF" stroke-width="3"/>
  <text x="960" y="195" text-anchor="middle" style="fill:#FFFFFF;font-size:28px;font-family:Arial;font-weight:bold;">🌐 Internet / Load Balancer</text>
  <line class="flow-line" x1="960" y1="230" x2="960" y2="280" stroke="url(#flow)" stroke-width="5" marker-end="url(#arrow)"/>

  <rect class="node" x="650" y="280" width="620" height="100" rx="24" fill="url(#card)" stroke="#2979FF" stroke-width="3"/>
  <text x="960" y="330" text-anchor="middle" style="fill:#00E5FF;font-size:32px;font-family:Arial;font-weight:bold;">🚀 Frontend / Ingress Gateway</text>
  <line class="flow-line" x1="960" y1="380" x2="960" y2="440" stroke="url(#flow)" stroke-width="5" marker-end="url(#arrow)"/>

  <!-- K8S CLUSTER BOUNDARY -->
  <rect x="50" y="440" width="1820" height="520" rx="30" fill="none" stroke="#00E5FF" stroke-width="3" stroke-dasharray="12 10"/>
  <text x="960" y="480" text-anchor="middle" class="section">☸️ Kubernetes Cluster — High-Availability Service Mesh (Port 80)</text>

  <!-- ROW 1 (Core) -->
  <g transform="translate(100, 520)">
    <rect class="node" width="250" height="110" rx="18" fill="url(#card)" stroke="#00E5FF" stroke-width="2"/>
    <text x="125" y="50" text-anchor="middle" class="service">📦 Product Catalog</text>
    <text x="125" y="80" text-anchor="middle" class="small">Go • Inventory</text>
  </g>
  <g transform="translate(420, 520)">
    <rect class="node" width="250" height="110" rx="18" fill="url(#card)" stroke="#00E5FF" stroke-width="2"/>
    <text x="125" y="50" text-anchor="middle" class="service">🛒 Cart Service</text>
    <text x="125" y="80" text-anchor="middle" class="small">.NET 8 • Session</text>
  </g>
  <g transform="translate(740, 520)">
    <rect class="node" width="250" height="110" rx="18" fill="url(#card)" stroke="#00E5FF" stroke-width="2"/>
    <text x="125" y="50" text-anchor="middle" class="service">💰 Checkout Flow</text>
    <text x="125" y="80" text-anchor="middle" class="small">Go • Orchestration</text>
  </g>
  <g transform="translate(1060, 520)">
    <rect class="node" width="250" height="110" rx="18" fill="url(#card)" stroke="#00E5FF" stroke-width="2"/>
    <text x="125" y="50" text-anchor="middle" class="service">💳 Payment Engine</text>
    <text x="125" y="80" text-anchor="middle" class="small">Node.js • Secure</text>
  </g>
  <g transform="translate(1380, 520)">
    <rect class="node" width="250" height="110" rx="18" fill="url(#card)" stroke="#00E5FF" stroke-width="2"/>
    <text x="125" y="50" text-anchor="middle" class="service">📧 Notification</text>
    <text x="125" y="80" text-anchor="middle" class="small">Python • Email</text>
  </g>

  <!-- ROW 2 (Secondary) -->
  <g transform="translate(100, 680)">
    <rect class="node" width="250" height="110" rx="18" fill="url(#card)" stroke="#2979FF" stroke-width="2"/>
    <text x="125" y="50" text-anchor="middle" class="service">💱 Currency Engine</text>
    <text x="125" y="80" text-anchor="middle" class="small">Node.js • Conversion</text>
  </g>
  <g transform="translate(420, 680)">
    <rect class="node" width="250" height="110" rx="18" fill="url(#card)" stroke="#2979FF" stroke-width="2"/>
    <text x="125" y="50" text-anchor="middle" class="service">🚚 Shipping Logic</text>
    <text x="125" y="80" text-anchor="middle" class="small">Go • Logistics</text>
  </g>
  <g transform="translate(740, 680)">
    <rect class="node" width="250" height="110" rx="18" fill="url(#card)" stroke="#2979FF" stroke-width="2"/>
    <text x="125" y="50" text-anchor="middle" class="service">📢 Ad Service</text>
    <text x="125" y="80" text-anchor="middle" class="small">Java 21 • Targeted</text>
  </g>
  <g transform="translate(1060, 680)">
    <rect class="node" width="250" height="110" rx="18" fill="url(#card)" stroke="#2979FF" stroke-width="2"/>
    <text x="125" y="50" text-anchor="middle" class="service">📊 Recommendation</text>
    <text x="125" y="80" text-anchor="middle" class="small">Python • Data Logic</text>
  </g>
  <g transform="translate(1380, 680)">
    <rect class="node" width="250" height="110" rx="18" fill="url(#card)" stroke="#2979FF" stroke-width="2"/>
    <text x="125" y="50" text-anchor="middle" class="service">🤖 Assistant (AI)</text>
    <text x="125" y="80" text-anchor="middle" class="small">Python • Vertex AI</text>
  </g>

  <!-- ROW 3 (State & Test) -->
  <g transform="translate(580, 830)">
    <rect class="node" width="250" height="110" rx="18" fill="url(#card)" stroke="#00E676" stroke-width="2"/>
    <text x="125" y="50" text-anchor="middle" class="service">💾 Redis Cache</text>
    <text x="125" y="80" text-anchor="middle" class="small">C • Stateful Data</text>
  </g>
  <g transform="translate(900, 830)">
    <rect class="node" width="250" height="110" rx="18" fill="url(#card)" stroke="#F44336" stroke-width="2"/>
    <text x="125" y="50" text-anchor="middle" class="service">📈 Load Generator</text>
    <text x="125" y="80" text-anchor="middle" class="small">Python • Traffic</text>
  </g>

  <!-- PULSE CONNECTIONS -->
  <line class="flow-line" x1="225" y1="440" x2="225" y2="520" stroke="#00E5FF" stroke-width="3"/>
  <line class="flow-line" x1="545" y1="440" x2="545" y2="520" stroke="#00E5FF" stroke-width="3"/>
  <line class="flow-line" x1="865" y1="440" x2="865" y2="520" stroke="#00E5FF" stroke-width="3"/>
  <line class="flow-line" x1="1185" y1="440" x2="1185" y2="520" stroke="#00E5FF" stroke-width="3"/>
  <line class="flow-line" x1="1505" y1="440" x2="1505" y2="520" stroke="#00E5FF" stroke-width="3"/>
  
  <line class="flow-line" x1="545" y1="630" x2="545" y2="680" stroke="#00E5FF" stroke-width="3"/>
  <line class="flow-line" x1="545" y1="790" x2="705" y2="830" stroke="#00E5FF" stroke-width="3"/>

  <!-- DEVOPS PIPELINE (FOOTER) -->
  <rect x="50" y="1000" width="1820" height="150" rx="24" fill="url(#card)" stroke="#2979FF" stroke-width="2"/>
  <text x="150" y="1040" class="pipeline">💻 Dev Commit</text>
  <line class="flow-line" x1="300" y1="1035" x2="400" y2="1035" stroke="url(#flow)" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="450" y="1040" class="pipeline">🧪 Jenkins CI</text>
  <line class="flow-line" x1="600" y1="1035" x2="700" y2="1035" stroke="url(#flow)" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="750" y="1040" class="pipeline">🐳 Docker Build</text>
  <line class="flow-line" x1="900" y1="1035" x2="1000" y2="1035" stroke="url(#flow)" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="1050" y="1040" class="pipeline">☸️ Helm Deploy</text>
  <line class="flow-line" x1="1200" y1="1035" x2="1300" y2="1035" stroke="url(#flow)" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="1350" y="1040" class="pipeline">🚀 High-Availability Cluster Runtime</text>

  <text x="960" y="1120" text-anchor="middle" style="fill:#FFFFFF;font-size:18px;font-family:Arial;font-weight:bold;">
    📊 Observability Layer — Liveness Probes • Readiness Checks • Auto Healing • Monitoring • Logging
  </text>
</svg>
